<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1100" viewBox="0 0 1400 1100">
  <style>
    .bg { fill:#ffffff; }
    .outer-area { fill:#f5f7fb; stroke:#e6eefb; stroke-width:2; }
    .app-hex { fill:#fff8e6; stroke:#f6ad55; stroke-width:2; }
    .core-hex { fill:#ffe6e6; stroke:#f87171; stroke-width:2; }
    .port { fill:#fff3bf; stroke:#d69e2e; stroke-width:1.4; rx:6; }
    .adapter { fill:#f8fafc; stroke:#64748b; stroke-width:1.2; rx:6; }
    .external { fill:#cfeafe; stroke:#2b6cb0; stroke-width:1.4; rx:8; }
    .text-title { font:700 20px 'Inter', Arial; fill:#0f172a; }
    .text { font:600 13px 'Inter', Arial; fill:#0f172a; }
    .muted { font:400 12px 'Inter', Arial; fill:#475569; }
    .thin { stroke:#94a3b8; stroke-width:1.2; }
    .arrow { stroke:#475569; stroke-width:2; fill:none; marker-end:url(#arr); }
    .box { fill:#ffffff; stroke:#cbd5e1; stroke-width:1; rx:6 }
  </style>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569" />
    </marker>
  </defs>

  <rect width="1400" height="1100" class="bg" />

  <text x="60" y="46" class="text-title">User Service — Hexagonal / Onion Architecture (accurate)</text>
  <text x="60" y="72" class="muted">Center=Domain; inner hex=Application services; ports along edges; adapters and externals around the outside (linked)</text>

  <!-- center at 700,560 -->
  <g transform="translate(700,560)">

    <!-- outer adapters band (hexagon) -->
    <polygon points="-480,0 -240,-415 240,-415 480,0 240,415 -240,415" class="outer-area" />

    <!-- application hexagon -->
    <polygon points="-240,0 -120,-207 120,-207 240,0 120,207 -120,207" class="app-hex" />

    <!-- domain core hexagon -->
    <polygon points="-80,0 -40,-69 40,-69 80,0 40,69 -40,69" class="core-hex" />
    <text x="0" y="-6" class="text" text-anchor="middle">Domain</text>
    <text x="0" y="16" class="muted" text-anchor="middle">Entities</text>

    <!-- application use-cases inside app hex -->
    <rect x="-90" y="-170" width="180" height="36" class="box" style="stroke:#f59e0b;"/>
    <text x="0" y="-148" class="text" text-anchor="middle">EmailVerificationService</text>

    <rect x="-90" y="120" width="180" height="36" class="box" style="stroke:#f59e0b;"/>
    <text x="0" y="142" class="text" text-anchor="middle">UserUseCase (UserUseCaseImpl)</text>

    <!-- Ports placed at the middle of each edge of app hex -->
    <!-- Top port (EmailSenderPort) -->
    <g>
      <rect x="-80" y="-235" width="160" height="36" class="port"/>
      <text x="0" y="-213" class="muted" text-anchor="middle">EmailSenderPort</text>
    </g>

    <!-- top-left port (Token repo) -->
    <g transform="rotate(-60)">
      <rect x="-80" y="-235" width="160" height="36" class="port"/>
      <text x="0" y="-213" class="muted" text-anchor="middle">EmailVerificationTokenRepositoryPort</text>
    </g>

    <!-- bottom-left port (UserRepositoryPort) -->
    <g transform="rotate(-120)">
      <rect x="-80" y="-235" width="160" height="36" class="port"/>
      <text x="0" y="-213" class="muted" text-anchor="middle">UserRepositoryPort</text>
    </g>

    <!-- bottom port (inbound port placeholder) -->
    <g transform="rotate(180)">
      <rect x="-80" y="-235" width="160" height="36" class="port"/>
      <text x="0" y="-213" class="muted" text-anchor="middle">Inbound Port: UserUseCase</text>
    </g>

    <!-- bottom-right port -->
    <g transform="rotate(120)">
      <rect x="-80" y="-235" width="160" height="36" class="port"/>
      <text x="0" y="-213" class="muted" text-anchor="middle">(auth / security port)</text>
    </g>

    <!-- top-right port -->
    <g transform="rotate(60)">
      <rect x="-80" y="-235" width="160" height="36" class="port"/>
      <text x="0" y="-213" class="muted" text-anchor="middle">Other Outbound Ports</text>
    </g>

    <!-- Adapters: place adapters near corresponding ports and draw connectors -->
    <!-- EmailSenderService (near top port) -->
    <g transform="translate(0,-385)">
      <rect x="-100" y="-60" width="200" height="44" class="adapter" />
      <text x="0" y="-34" class="muted" text-anchor="middle">EmailSenderService</text>
      <text x="0" y="-16" class="muted" text-anchor="middle">implements EmailSenderPort</text>
      <!-- external mailpit -->
      <rect x="-320" y="-150" width="120" height="44" class="external"/>
      <text x="-260" y="-122" class="muted">Mailpit (SMTP)</text>
      <path class="arrow" d="M-100 -20 L -320 -120" />
      <!-- connector to port -->
      <path class="arrow" d="M0 -350 L 0 -270" />
    </g>

    <!-- Token repo adapter (top-left) -->
    <g transform="translate(-360,-170)">
      <rect x="-100" y="-20" width="220" height="44" class="adapter" />
      <text x="10" y="12" class="muted">EmailVerificationTokenRepositoryAdapter</text>
      <text x="10" y="30" class="muted">implements EmailVerificationTokenRepositoryPort</text>
      <rect x="-320" y="80" width="120" height="44" class="external"/>
      <text x="-260" y="108" class="muted">Postgres (tokens)</text>
      <path class="arrow" d="M-40 0 L -320 100" />
      <path class="arrow" d="M-120 -90 L -220 -40" />
    </g>

    <!-- UserRepo adapter (bottom-left) -->
    <g transform="translate(-260,240)">
      <rect x="-110" y="-10" width="220" height="44" class="adapter" />
      <text x="0" y="20" class="muted">UserRepositoryAdapter</text>
      <text x="0" y="36" class="muted">implements UserRepositoryPort</text>
      <rect x="-320" y="90" width="120" height="44" class="external"/>
      <text x="-260" y="118" class="muted">Postgres (users, roles)</text>
      <path class="arrow" d="M-40 0 L -320 100" />
      <path class="arrow" d="M-80 60 L -140 140" />
    </g>

    <!-- UserServiceAdapter / AuthController cluster (right side inbound) -->
    <g transform="translate(420,-160)">
      <rect x="-80" y="-120" width="180" height="44" class="adapter" />
      <text x="10" y="-96" class="muted">UserServiceAdapter</text>
      <text x="10" y="-78" class="muted">implements UserUseCase (inbound)</text>

      <rect x="220" y="-170" width="160" height="44" class="adapter" />
      <text x="300" y="-146" class="muted">AuthController</text>
      <rect x="420" y="-170" width="120" height="44" class="external" />
      <text x="480" y="-146" class="muted">Client (UI)</text>

      <path class="arrow" d="M-10 -80 L 240 -150" />
      <path class="arrow" d="M240 -126 L 420 -150" />
      <!-- connector from inbound port to adapter -->
      <path class="arrow" d="M160 120 L 240 40" />
    </g>

    <!-- EmailVerificationFacade (infra facade) near right-top -->
    <g transform="translate(260,-320)">
      <rect x="-90" y="-20" width="180" height="44" class="adapter" />
      <text x="0" y="6" class="muted" text-anchor="middle">EmailVerificationFacade</text>
      <text x="0" y="24" class="muted" text-anchor="middle">@Service (delegates to EmailVerificationService)</text>
      <path class="arrow" d="M-20 20 L -20 60" />
      <path class="arrow" d="M-10 -40 L -80 -120" />
    </g>

    <!-- Security adapters cluster (right-center) -->
    <g transform="translate(360,0)">
      <rect x="-70" y="-10" width="140" height="44" class="adapter"/>
      <text x="0" y="18" class="muted">CustomUserDetailsService</text>
      <rect x="100" y="80" width="160" height="44" class="adapter"/>
      <text x="180" y="108" class="muted">JwtTokenService</text>
      <path class="arrow" d="M0 24 L 120 90" />
    </g>

    <!-- small arrows to show which ports map to which adapters (approx) -->
    <path class="arrow" d="M0 -220 L 0 -280" />
    <path class="arrow" d="M-140 -120 L -240 -200" />
    <path class="arrow" d="M-120 60 L -240 160" />
    <path class="arrow" d="M120 60 L 260 160" />
    <path class="arrow" d="M260 -40 L 360 -120" />
    <path class="arrow" d="M120 -200 L 220 -260" />

  </g>

  <!-- Legend -->
  <rect x="960" y="80" width="360" height="180" class="box" style="fill:#ffffff;stroke:#e6eefb;" />
  <text x="980" y="110" class="text">Legend</text>
  <text x="980" y="136" class="muted">Core: Domain (entities)</text>
  <text x="980" y="156" class="muted">Inner hex: Application services</text>
  <text x="980" y="176" class="muted">Ports: interfaces declared by app</text>
  <text x="980" y="196" class="muted">Adapters: infra implementations (controllers, repos, mail)</text>
  <text x="980" y="216" class="muted">Externals: Postgres, Mailpit, Clients</text>

</svg>

