# Test profile: use Flyway against H2
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# In tests, keep it simple: let Hibernate create/update the schema in H2.
# Flyway still runs, but this removes the boot-time ordering issue where Hibernate
# validates before Flyway has created tables.
spring.jpa.hibernate.ddl-auto=update

spring.cloud.config.enabled=false
spring.docker.compose.enabled=false
