# --- Flyway first ---
spring.flyway.enabled=true
# IMPORTANT: do NOT baseline in dev. Baselining at version 1 will skip V1__init_schema.sql.
spring.flyway.baseline-on-migrate=false
spring.flyway.locations=classpath:db/migration
spring.flyway.url=${spring.datasource.url}
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}

# --- JPA/Hibernate ---
# In dev, allow the app to start on an empty DB so Flyway can create the schema first.
# Hibernate will not attempt schema validation/creation at bootstrap.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false


# Dev seeding is handled by Flyway repeatable migrations (R__*.sql)
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Ensure /api paths go to controllers, not static resource handler
spring.mvc.static-path-pattern=/static/**
spring.web.resources.static-locations=classpath:/static/

# Suppress security autoconfiguration warnings in dev
logging.level.org.springframework.boot.autoconfigure.security=ERROR

# Local user-service database (started via compose-dev.yaml)
spring.datasource.url=jdbc:postgresql://localhost:5433/user_db
spring.datasource.username=myuser
spring.datasource.password=secret
