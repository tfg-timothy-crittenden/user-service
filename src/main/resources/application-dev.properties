# Dev profile: keep only dev-only toggles. DB init + seeding is identical in all modes.
server.forward-headers-strategy=framework
# (Optional) If you want dev to point at a different DB than default, keep these overrides.
# Otherwise you can delete them and inherit from application.properties.
spring.datasource.url=jdbc:postgresql://localhost:5433/user_db
spring.datasource.username=myuser
spring.datasource.password=secret

# --- OpenAPI / Swagger (springdoc) ---
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui

# Dev HMAC secret for token hashing (toy app only). Replace for your environment if needed.
# WARNING: this is checked at startup and must be at least 16 characters long.
app.tokens.hmac-secret=d4b1f0e5c3a2b9f7e6d4c3b2a1f0e9d8cafb1234567890abcdef1234567890ab
