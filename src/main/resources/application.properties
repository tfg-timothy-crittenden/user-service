spring.application.name=user-service
spring.cloud.config.enabled=false
server.port=8084

# When running behind a gateway / reverse proxy, honor X-Forwarded-* headers

# so redirects (e.g. to /login) point back to the gateway URL.
server.forward-headers-strategy=framework

# Default profile when running from IntelliJ / host machine
spring.profiles.default=local

# Prevent Spring Boot from automatically running compose.yaml on startup
spring.docker.compose.enabled=false

# Eureka: always register the actual server.port (avoid registering :0)
eureka.instance.hostname=host.docker.internal
eureka.instance.nonSecurePort=${server.port}
eureka.instance.instance-id=${spring.application.name}:${eureka.instance.hostname}:${server.port}
eureka.instance.preferIpAddress=false
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

logging.level.org.springframework.security=DEBUG

# Eureka client (common)
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

logging.level.com.netflix.discovery=DEBUG
logging.level.org.springframework.cloud.netflix.eureka=DEBUG
logging.level.org.springframework.core.env=DEBUG

# Local database (running in Docker)
spring.datasource.url=jdbc:postgresql://localhost:5433/user_db
spring.datasource.username=myuser
spring.datasource.password=secret

# --- Mail (Mailpit SMTP) ---
# Allow overriding via environment variables in Docker: SPRING_MAIL_HOST, SPRING_MAIL_PORT
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS:false}
app.mail.from=${APP_MAIL_FROM:no-reply@tfg.local}

# --- Flyway (schema migrations + seeding) ---
# Run both versioned and repeatable migrations in all profiles.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.url=${spring.datasource.url}
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}

# Baseline-only strategy: V1__baseline.sql defines the whole schema.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true
# Ignore migrations that exist in the DB history but no longer have a local script.
# This covers cases where a versioned migration was later replaced by a repeatable one.
spring.flyway.ignore-migration-patterns=*:Missing

# --- JPA/Hibernate ---
# Flyway owns schema creation; Hibernate shouldn't validate or auto-create tables.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Never run data.sql / schema.sql; seed via Flyway repeatable migrations instead.
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Suppress security autoconfiguration warnings in dev (we're using permitAll)
logging.level.org.springframework.boot.autoconfigure.security=ERROR

# --- OpenAPI / Swagger (springdoc) ---
# Default: off. Enable in dev via application-dev.properties.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# HMAC secret for tokens (used by TokenEncoderAdapter). For production, set via environment or secrets manager.
# Example: export APP_TOKENS_HMAC_SECRET=... or set in your Docker Compose service env.
app.tokens.hmac-secret=${APP_TOKENS_HMAC_SECRET:d4b1f0e5c3a2b9f7e6d4c3b2a1f0e9d8cafb1234567890abcdef1234567890ab}

# Frontend verify-email URL template. Use {token} as placeholder which will be replaced with the generated token.
# Example for local frontend:
app.frontend.verify-email-url=http://localhost:5173/verify-email?token={token}
app.frontend.invitation-url=http://localhost:5173/signup-with-invitation?token={token}

# --- Kafka ---
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Topic names
app.kafka.topics.teacher-role-revoked=user.teacher-role-revoked.v1

